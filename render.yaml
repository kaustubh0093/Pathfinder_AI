services:
  - type: web
    name: pathfinder-ai-backend
    runtime: python
    rootDir: pathfinder-ai
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROQ_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: APP_SECRET
        sync: false
