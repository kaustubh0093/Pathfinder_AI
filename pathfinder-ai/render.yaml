services:
  - type: web
    name: pathfinder-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: APP_SECRET
        sync: false
